<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Loading...</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'SF Mono','Cascadia Code','Fira Code','Consolas',monospace;
      display:flex;flex-direction:column;
      min-height:100vh;
      background:#111113;color:#6e6e76;
    }
    body::before{
      content:'';display:block;height:2px;
      background:linear-gradient(90deg,#10b981 0%,#06b6d4 50%,#10b981 100%);
    }
    .loading{
      flex:1;display:flex;flex-direction:column;
      justify-content:center;align-items:flex-start;
      padding:2rem;max-width:56rem;
    }
    .text{display:flex;align-items:center;gap:0.5rem;font-size:0.9rem}
    .dots span{
      display:inline-block;width:4px;height:4px;
      background:#10b981;border-radius:50%;
      animation:blink 1.4s infinite both;
    }
    .dots span:nth-child(2){animation-delay:.2s}
    .dots span:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
  </style>
</head>
<body>
  <div class="loading">
    <div class="text">
      starting native-agents
      <span class="dots"><span></span><span></span><span></span></span>
    </div>
  </div>
  <script>
    // Poll until FastHTML server is ready, then redirect
    const poll = setInterval(async () => {
      try {
        const res = await fetch('http://127.0.0.1:5001/health');
        if (res.ok) {
          clearInterval(poll);
          window.location.href = 'http://127.0.0.1:5001';
        }
      } catch {}
    }, 200);
  </script>
</body>
</html>
